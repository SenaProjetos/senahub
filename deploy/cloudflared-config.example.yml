# Config do Cloudflare Tunnel para o SenaHub.
# Copie para o diretório .cloudflared do servidor e substitua <<...>>.
#
# Local do arquivo:
#   - Rodando manual  (cloudflared tunnel run):   %USERPROFILE%\.cloudflared\config.yml
#   - Rodando como serviço (cloudflared service install):
#       C:\Windows\System32\config\systemprofile\.cloudflared\config.yml
#   O credentials-file (UUID.json) é gerado por `cloudflared tunnel create senahub`
#   e fica no MESMO diretório .cloudflared usado.

tunnel: <<TUNNEL_UUID>>
credentials-file: C:\Windows\System32\config\systemprofile\.cloudflared\<<TUNNEL_UUID>>.json

# Roteamento de entrada. WebSocket (Socket.io/chat) passa automaticamente — sem config extra.
#
# IMPORTANTE: sem "httpHostHeader", o cloudflared manda para a origem o Host
# "localhost:3000" (o endereço em "service:"), não o domínio público. Isso quebra
# qualquer redirect absoluto construído a partir do header Host (ex.: middleware.ts
# usando req.nextUrl.clone() para mandar usuário não-autenticado para /login) —
# o navegador acaba indo parar em "https://localhost:3000/login" (ERR_SSL_PROTOCOL_ERROR).
ingress:
  - hostname: <<hub.seudominio.com.br>>
    service: http://localhost:3000
    originRequest:
      httpHostHeader: <<hub.seudominio.com.br>>
  # Regra final obrigatória (catch-all):
  - service: http_status:404
